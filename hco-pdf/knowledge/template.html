<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Document Title]</title>
  <style>
    @font-face {
      font-family: 'VC Nudge';
      src: url('fonts/VCNudge-ExtraBold.woff') format('woff');
      font-weight: 800;
      font-style: normal;
    }

    @font-face {
      font-family: 'Manrope';
      src: url('fonts/Manrope-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Manrope';
      src: url('fonts/Manrope-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
    }

    @font-face {
      font-family: 'Manrope';
      src: url('fonts/Manrope-Semibold.woff') format('woff');
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: 'Manrope';
      src: url('fonts/Manrope-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --font-display: 'VC Nudge', sans-serif;
      --font-body: 'Manrope', sans-serif;
      --page-bg: #fff4e6;
      --text-primary: #212121;
      --text-secondary: #52525b;
      --text-muted: #a1a1aa;
      --border-light: #e4e4e7;
      --accent-green: #86efac;
      --accent-pink: #ffbfe8;
      --accent-sky: #bae6fd;
      --accent-orange: #fdba74;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--page-bg);
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 11pt;
      letter-spacing: 0.01em;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 100%;
      padding: 36px 24px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 42pt;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-primary);
      line-height: 0.9;
      letter-spacing: -0.01em;
      margin-bottom: 14px;
    }

    h2 {
      font-family: var(--font-display);
      font-size: 18pt;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-primary);
      line-height: 1;
      letter-spacing: -0.01em;
      margin-top: 32px;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--text-primary);
    }

    h3 {
      font-family: var(--font-body);
      font-size: 11pt;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      margin-top: 20px;
      margin-bottom: 6px;
    }

    .lead {
      font-size: 12pt;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    p { margin-bottom: 10px; }

    /* Cards */
    .card {
      background: #ffffff;
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 24px;
      margin: 16px 0;
    }

    .card h4 {
      font-size: 11pt;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    /* Two-column grid */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 16px 0;
    }

    /* Lists */
    ul, ol {
      padding-left: 18px;
      margin-bottom: 10px;
    }

    li {
      margin-bottom: 4px;
      font-size: 11pt;
    }

    /* Checklist */
    .checklist {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px 24px;
      margin: 16px 0;
    }

    .checklist ul { list-style: none; padding: 0; }

    .checklist li {
      padding: 6px 0;
      padding-left: 24px;
      position: relative;
      border-bottom: 1px solid var(--border-light);
    }

    .checklist li:last-child { border-bottom: none; }

    .checklist li::before {
      content: "□";
      position: absolute;
      left: 0;
      color: var(--text-muted);
      font-size: 12pt;
      top: 6px;
    }

    /* Callout boxes */
    .callout {
      border-radius: 16px;
      padding: 24px;
      margin: 24px 0;
    }

    .callout-green { background: linear-gradient(135deg, var(--accent-green) 0%, #a7f3d0 100%); }
    .callout-pink { background: linear-gradient(135deg, var(--accent-pink) 0%, #fdd6eb 100%); }
    .callout-sky { background: linear-gradient(135deg, var(--accent-sky) 0%, #dbeafe 100%); }
    .callout-orange { background: linear-gradient(135deg, var(--accent-orange) 0%, #fed7aa 100%); }

    .callout h3 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .callout li { color: var(--text-primary); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 11pt;
    }

    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }

    th {
      font-weight: 700;
      color: var(--text-primary);
      background: #ffffff;
    }

    /* Code */
    code {
      background: #f0f0f0;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9pt;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    }

    /* Numbered steps */
    .step {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 14px;
      margin: 20px 0;
      align-items: start;
    }

    .step-number {
      width: 42px;
      height: 42px;
      background: var(--text-primary);
      color: #fff;
      font-family: var(--font-body);
      font-size: 18pt;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }

    /* Page breaks for multi-page PDFs */
    .page-break { page-break-after: always; }
  </style>
</head>
<body>
  <main class="page">
    <!-- Content goes here -->
  </main>
</body>
</html>
