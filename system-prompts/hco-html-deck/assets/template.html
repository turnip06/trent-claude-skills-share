<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Presentation Template</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400&family=Inter:wght@400;700&family=Manrope:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--font-headline:'Anton',sans-serif;--font-body:'Manrope',sans-serif;--font-mono:'IBM Plex Mono',monospace;--color-black:#000;--color-white:#FFF;--color-green:#C5F47A;--color-text-main:#212121}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background-color:#f0f0f0;color:var(--color-text-main)}
.presentation{width:100%;max-width:1920px;margin:0 auto;display:flex;flex-direction:column;gap:clamp(1rem,2vw,2rem);padding:clamp(1rem,2vw,2rem)}
.slide{width:100%;aspect-ratio:16/9;margin:0 auto;background-color:var(--color-white);box-shadow:0 clamp(5px,1vw,10px) clamp(12px,2.5vw,25px) rgba(0,0,0,0.1);position:relative;overflow:hidden}
.slide-content{width:100%;height:100%;padding:clamp(2.7vw,5%,5.4vw) clamp(3.8vw,7%,7.6vw) clamp(2.7vw,5%,5.4vw) clamp(3.2vw,6%,6.4vw);display:flex;flex-direction:column}
.watermark-line{position:absolute;left:clamp(1.3vw,2.5%,2.6vw);top:0;width:clamp(0.5px,0.1vw,1px);height:100%;background-color:var(--color-black);pointer-events:none}
.watermark-text{position:absolute;left:clamp(1.3vw,2.5%,2.6vw);bottom:clamp(1.3vw,2.5%,2.6vw);transform-origin:bottom left;transform:rotate(-90deg);font-family:var(--font-mono);font-size:clamp(6px,0.6vw,11px);text-transform:uppercase;letter-spacing:0.05em;color:var(--color-black);white-space:nowrap;pointer-events:none}
h1{font-family:var(--font-headline);font-weight:400;text-transform:uppercase;font-size:clamp(2rem,5vw,6rem);line-height:0.95;letter-spacing:-0.02em;margin-bottom:clamp(1rem,3.5vw,2.5rem);color:var(--color-black)}
h2{font-family:var(--font-body);font-weight:300;font-size:clamp(0.9rem,1.3vw,1.5rem);color:var(--color-black);margin-bottom:clamp(0.3rem,0.7vw,0.5rem)}
p,li{font-family:var(--font-body);font-weight:300;font-size:clamp(0.75rem,0.8vw,0.95rem);line-height:1.55}
p+p,p+ul{margin-top:clamp(0.8rem,1.8vw,1.2rem)}
hr{border:none;border-top:clamp(0.5px,0.1vw,1px) solid var(--color-black);margin-bottom:clamp(0.6rem,1.5vw,1rem)}
.two-col-layout{display:flex;gap:clamp(1.5rem,3.5vw,4.2rem);width:100%}
.column{flex:1}
.single-col-content{max-width:85%;}
.highlight-link{text-decoration:underline;color:var(--color-black);background-color:var(--color-green);padding:0.1em 0.3em;border-radius:clamp(2px,0.3vw,3px)}
ul{padding-left:clamp(0.6rem,1vw,1rem);list-style-position:outside;margin:0}
li{padding-left:clamp(0.3rem,0.4vw,0.5rem);margin-bottom:clamp(0.3rem,0.4vw,0.5rem)}
@media (max-width:768px){.presentation{padding:1rem;gap:1rem}.slide-content{padding:8% 6%}.watermark-line,.watermark-text{left:3%}.watermark-text{bottom:3%}.two-col-layout{flex-direction:column;gap:2rem}h1{margin-bottom:2rem}}
</style>
</head>
<body>
<main class="presentation">
<!-- SLIDE CONTENT GOES HERE -->
</main>
</body>
</html>
