<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       FOUNDATION — Do not remove these base styles.
       Customize the design tokens and slide content.
       ============================================ */

    :root {
      /* Typography */
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;

      /* Backgrounds — dark default */
      --bg-dark: #0a0a0a;
      --bg-pure-black: #000000;

      /* Backgrounds — bold color (use sparingly, 2-4 per deck) */
      --bg-electric-yellow: #CCFF00;
      --bg-cobalt: #0038FF;
      --bg-olive: #4A5D23;
      --bg-hot-pink: #FF1493;

      /* Text */
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --text-muted: #555555;

      /* Accents — use ONE per slide on dark backgrounds */
      --accent-coral: #FF6B6B;
      --accent-cyan: #22D3EE;
      --accent-amber: #FFD93D;
      --accent-violet: #A78BFA;

      /* Layout */
      --slide-w: 1920px;
      --slide-h: 1080px;
      --margin: 120px;
      --meta-inset: 40px 60px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ---- Slide Container ---- */
    .slide {
      width: var(--slide-w);
      height: var(--slide-h);
      position: absolute;
      top: 0;
      left: 0;
      display: none;
      overflow: hidden;
      background: var(--bg-dark);
      color: var(--text-primary);
    }

    .slide.active {
      display: flex;
    }

    /* ---- Bold Color Slide Variants ---- */
    .slide--yellow { background: var(--bg-electric-yellow); color: #000; }
    .slide--cobalt { background: var(--bg-cobalt); color: #fff; }
    .slide--olive  { background: var(--bg-olive); color: #fff; }
    .slide--pink   { background: var(--bg-hot-pink); color: #fff; }
    .slide--black  { background: var(--bg-pure-black); }

    /* Adjust signposting on light backgrounds */
    .slide--yellow .slide-meta span { color: rgba(0,0,0,0.3); }
    .slide--yellow .slide-content { color: #000; }
    .slide--yellow .headline { color: #000; }

    /* ---- Signposting System (appears on EVERY slide) ---- */
    .slide-meta {
      position: absolute;
      inset: 0;
      padding: 40px 60px;
      pointer-events: none;
      z-index: 10;
    }

    .slide-meta span {
      position: absolute;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .meta-tl { top: 40px; left: 60px; }
    .meta-tc { top: 40px; left: 50%; transform: translateX(-50%); }
    .meta-tr { top: 40px; right: 60px; }
    .meta-br { bottom: 40px; right: 60px; }
    .meta-bl { bottom: 40px; left: 60px; }

    /* ---- Slide Content Area ---- */
    .slide-content {
      width: 100%;
      height: 100%;
      padding: var(--margin);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 5;
    }

    /* ---- Typography ---- */
    .headline {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 0.9;
      color: var(--text-primary);
    }

    /* Scale: use the right size for the content's needs */
    .headline--xxl { font-size: 220px; }  /* Edge-to-edge, frame-filling */
    .headline--xl  { font-size: 160px; }  /* Primary statements */
    .headline--lg  { font-size: 120px; }  /* Section titles */
    .headline--md  { font-size: 80px; }   /* Secondary headlines */
    .headline--sm  { font-size: 56px; }   /* Smaller headlines */

    .body-text {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 28px;
      line-height: 1.5;
      color: var(--text-secondary);
      max-width: 900px;
    }

    .label {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Micro-text: metadata, annotations, detail typography */
    .micro {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ---- Accent Highlight ---- */
    .accent--coral  { color: var(--accent-coral); }
    .accent--cyan   { color: var(--accent-cyan); }
    .accent--amber  { color: var(--accent-amber); }
    .accent--violet { color: var(--accent-violet); }

    /* ---- Micro-Graphic Elements ---- */
    .rule {
      width: 80px;
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin: 24px 0;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      display: inline-block;
    }

    .underscored {
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
    }

    .bracket::before { content: '['; opacity: 0.4; margin-right: 4px; }
    .bracket::after  { content: ']'; opacity: 0.4; margin-left: 4px; }

    /* ---- Layout Helpers ---- */
    .bottom-left {
      margin-top: auto;
    }

    .bottom-right {
      margin-top: auto;
      margin-left: auto;
      text-align: right;
    }

    .centered {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 100%;
    }

    .v-center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
    }

    .full-frame {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      padding: 0;
      overflow: hidden;
    }

    /* ---- Image Background ---- */
    .slide--image-bg {
      background-size: cover;
      background-position: center;
    }

    .slide--image-bg .slide-content {
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.3) 0%,
        rgba(0, 0, 0, 0.65) 100%
      );
    }

    /* ---- Video Placeholder ---- */
    .video-placeholder {
      width: 100%;
      max-width: 1400px;
      aspect-ratio: 16/9;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: auto;
    }

    .video-placeholder .play-icon {
      width: 56px;
      height: 56px;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .video-placeholder .play-icon::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-left: 16px solid rgba(255, 255, 255, 0.25);
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      margin-left: 3px;
    }

    .video-placeholder .placeholder-label {
      font-family: var(--font-body);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .video-placeholder .placeholder-duration {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

  <!-- ============================================
       SLIDES — Add your slides here.
       Each <section class="slide"> is one slide.
       The .slide-meta block goes on EVERY slide.
       ============================================ -->

  <!-- EXAMPLE: Typography-only statement (bottom-left anchor) -->
  <section class="slide active" id="slide-1">
    <div class="slide-meta">
      <span class="meta-tl">TRENT MICHAEL</span>
      <span class="meta-tc">PROCESS SYDNEY 002</span>
      <span class="meta-br">01</span>
    </div>
    <div class="slide-content bottom-left">
      <h1 class="headline headline--xl">
        Your headline<br>
        goes <span class="accent--coral">here</span>
      </h1>
    </div>
  </section>

  <!-- EXAMPLE: Section divider on bold color -->
  <section class="slide slide--yellow" id="slide-2">
    <div class="slide-meta">
      <span class="meta-tl">TRENT MICHAEL</span>
      <span class="meta-tc">THE BORING STUFF</span>
      <span class="meta-br">02</span>
    </div>
    <div class="slide-content v-center">
      <span class="label" style="color: rgba(0,0,0,0.4);">Act One</span>
      <h2 class="headline headline--lg" style="margin-top: 24px;">
        Section title
      </h2>
    </div>
  </section>

  <!-- EXAMPLE: Video placeholder -->
  <section class="slide" id="slide-3">
    <div class="slide-meta">
      <span class="meta-tl">TRENT MICHAEL</span>
      <span class="meta-tc">THE BORING STUFF</span>
      <span class="meta-br">03</span>
    </div>
    <div class="slide-content">
      <div class="video-placeholder">
        <div class="play-icon"></div>
        <span class="placeholder-label">Screen Recording</span>
        <span class="placeholder-duration">&le;45s</span>
      </div>
    </div>
  </section>

  <!-- EXAMPLE: Extreme negative space (tiny centered text) -->
  <section class="slide" id="slide-4">
    <div class="slide-meta">
      <span class="meta-tl">TRENT MICHAEL</span>
      <span class="meta-tc">THE HONEST BIT</span>
      <span class="meta-br">04</span>
    </div>
    <div class="slide-content centered">
      <p class="body-text" style="text-align: center; max-width: 500px; color: var(--text-secondary);">
        A small, quiet statement<br>in a vast empty frame.
      </p>
    </div>
  </section>


  <!-- ============================================
       NAVIGATION SCRIPT
       Arrow keys, click, or call showSlide(n)
       ============================================ -->
  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;

    function showSlide(n) {
      slides[current].classList.remove('active');
      current = Math.max(0, Math.min(n, slides.length - 1));
      slides[current].classList.add('active');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        showSlide(current + 1);
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        showSlide(current - 1);
      }
    });

    // Expose for Chrome MCP automation
    window.showSlide = showSlide;
    window.getSlideCount = () => slides.length;
    window.getCurrentSlide = () => current;
  </script>
</body>
</html>
